services:
  mysql-test:
    image: mysql:8.0
    container_name: kws-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: testpass
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysql", "-uroot", "-ptestpass", "-h", "127.0.0.1", "-P", "3306"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 50s

  redis-test:
    image: redis:7-alpine
    container_name: kws-test-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  mock-core:
    image: python:3.12-alpine
    container_name: kws-test-mock-core
    working_dir: /app
    volumes:
      - ./mock_core.py:/app/mock_core.py
    command: ["python", "mock_core.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 2s
      timeout: 3s
      retries: 10

  rustfs-test:
    image: rustfs/rustfs:latest
    container_name: kws-test-rustfs
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
      RUSTFS_VOLUMES: /data/rustfs0
      RUSTFS_OBS_LOG_DIRECTORY: /logs
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_OBS_LOGGER_LEVEL: warn
      RUSTFS_OBS_ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9000"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

  control-test:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: kws-test-control
    restart: on-failure:3
    ports:
      - "18081:8081"
    environment:
      DB_USER: root
      DB_PASSWORD: testpass
      DB_HOST: mysql-test
      DB_PORT: "3306"
      DB_NAME: core_base
      GUAC_DB_USER: root
      GUAC_DB_PASSWORD: testpass
      GUAC_DB_HOST: mysql-test
      GUAC_DB_PORT: "3306"
      GUAC_DB_NAME: guacamole_db
      REDIS_HOST: redis-test:6379
      CORES: mock-core:8080
      GUACAMOLE_BASE_URL: http://mock-core:8080/guacamole
      CMS_HOST: mock-core:8080
      RUSTFS_ENDPOINT: http://rustfs-test:9000
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      mock-core:
        condition: service_healthy
      rustfs-test:
        condition: service_healthy
